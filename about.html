<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6366f1">
  <meta name="description" content="关于 ZSD - C++ 学习者">
  <title>关于 - ZSD's Blog</title>

  <!-- ECharts -->
  <script src="lib/echarts.min.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/about.css">
  <link rel="stylesheet" href="css/responsive.css">

</head>
<body>

  <!-- Header -->
  <header class="header">
    <nav class="header-inner">
      <a href="index.html" class="header-logo">
        <span class="header-logo-icon">Z</span>
        <span>ZSD's Blog</span>
      </a>
      <div class="header-nav">
        <a href="index.html">首页</a>
        <a href="about.html" class="active">关于</a>
      </div>
      <div class="header-actions">
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">🌙</button>
      </div>
    </nav>
  </header>

  <!-- Main -->
  <main class="main">
    <div class="about-page">

      <!-- Hero Section -->
      <section class="hero" id="hero-section" style="min-height:380px;background:linear-gradient(135deg, var(--color-primary-bg) 0%, transparent 50%, var(--color-primary-bg) 100%)">
        <div class="container">
          <div class="about-avatar" id="about-avatar">Z</div>
          <h1 class="hero-title" id="about-name" style="font-size:2rem;margin-bottom:0.5rem"></h1>
          <p class="hero-subtitle" id="about-bio" style="max-width:600px"></p>
        </div>
      </section>

      <div class="container">

        <!-- Skills Chart -->
        <section class="about-section">
          <h2 class="section-title" style="text-align:center">🛠️ 技能分布</h2>
          <p class="section-subtitle" style="text-align:center">持续学习中，不断成长</p>
          <div class="about-section-card">
            <div class="about-chart-wrapper">
              <div id="about-chart"></div>
            </div>
          </div>
        </section>

        <!-- Timeline -->
        <section class="about-section">
          <h2 class="section-title" style="text-align:center">📅 学习历程</h2>
          <p class="section-subtitle" style="text-align:center">每一步都算数</p>
          <div class="about-section-card">
            <div class="timeline" id="timeline"></div>
          </div>
        </section>

        <!-- Social Links -->
        <section class="about-section">
          <div class="about-social">
            <a href="https://github.com/banluo2006" target="_blank" rel="noopener" title="GitHub">🐙 github.com/banluo2006</a>
            <a href="javascript:void(0)" onclick="copyEmail()" title="点击复制邮箱">✉️ 3112371653@qq.com</a>
          </div>
        </section>

      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner" style="flex-direction:column;gap:0.5rem">
      <div style="display:flex;align-items:center;justify-content:space-between;width:100%;flex-wrap:wrap;gap:1rem">
        <div class="footer-copyright">
          &copy; 2026 ZSD's Blog. Built with ❤️
        </div>
        <div class="footer-links">
          <a href="https://github.com/banluo2006" target="_blank" rel="noopener">github.com/banluo2006</a>
          <a href="javascript:void(0)" data-email="true" onclick="copyEmail()" title="点击复制邮箱">3112371653@qq.com</a>
        </div>
      </div>
      <div style="font-size:0.75rem;color:var(--color-text-muted);text-align:center;width:100%;border-top:1px solid rgba(255,255,255,0.08);padding-top:0.75rem;line-height:1.6">
        免责声明：本博客所有内容仅供个人学习参考，不构成任何建议。转载文章请联系作者获取授权。
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="data/site-config.js"></script>
  <script src="data/posts.js"></script>
  <script src="js/blog-data.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/about.js"></script>
  <script>
    initTheme();
    initColorScheme();
    initAbout();

    function copyEmail() {
      const addr = '3112371653@qq.com';
      navigator.clipboard.writeText(addr).then(() => {
        const btn = document.querySelector('a[onclick*="copyEmail"]');
        const orig = btn.textContent;
        btn.textContent = '✅ 已复制';
        setTimeout(() => btn.textContent = orig, 2000);
      });
    }
  </script>
</body>
</html>
