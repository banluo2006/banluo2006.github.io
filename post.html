<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6366f1">
  <title>文章 - ZSD's Blog</title>

  <!-- Markdown & Highlight -->
  <script src="lib/marked.min.js"></script>
  <link rel="stylesheet" href="lib/github.min.css" id="hljs-theme">
  <script src="lib/highlight.min.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/post.css">
  <link rel="stylesheet" href="css/responsive.css">

</head>
<body>

  <!-- Reading Progress -->
  <div class="progress-bar" id="reading-progress"></div>

  <!-- Header -->
  <header class="header">
    <nav class="header-inner">
      <a href="index.html" class="header-logo">
        <span class="header-logo-icon">Z</span>
        <span>ZSD's Blog</span>
      </a>
      <div class="header-nav">
        <a href="index.html">首页</a>
        <a href="about.html">关于</a>
      </div>
      <div class="header-actions">
        <button class="theme-toggle" onclick="toggleTheme()" aria-label="切换主题">🌙</button>
      </div>
    </nav>
  </header>

  <!-- Main -->
  <main class="main">
    <article class="post-page">
      <div class="container">

        <!-- Back -->
        <a href="index.html" class="post-back">← 返回首页</a>

        <!-- Post Header -->
        <header class="post-header">
          <span class="blog-card-category" id="post-category"></span>
          <h1 class="post-title" id="post-title"></h1>
          <div class="post-meta">
            <span class="post-meta-item" id="post-date"></span>
            <span class="post-meta-divider"></span>
            <span class="post-meta-item" id="post-reading-time"></span>
          </div>
          <div class="post-tags" id="post-tags"></div>
        </header>

        <!-- Post Content -->
        <div class="post-content">
          <!-- Mobile TOC Toggle -->
          <button class="mobile-toc-toggle">
            <span>📑 目录</span>
            <span class="toc-arrow">▸</span>
          </button>
          <div class="mobile-toc-content"></div>

          <!-- TOC Sidebar -->
          <aside class="post-toc-wrapper">
            <div class="post-toc-title">📑 目录</div>
            <ul class="post-toc-list"></ul>
          </aside>

          <!-- Post Body -->
          <div class="post-body" id="post-body"></div>

          <!-- Post Navigation -->
          <nav class="post-nav">
            <div id="post-nav-prev"></div>
            <div id="post-nav-next"></div>
          </nav>
        </div>

      </div>
    </article>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-inner" style="flex-direction:column;gap:0.5rem">
      <div style="display:flex;align-items:center;justify-content:space-between;width:100%;flex-wrap:wrap;gap:1rem">
        <div class="footer-copyright">
          &copy; 2026 ZSD's Blog. Built with ❤️
        </div>
        <div class="footer-links">
          <a href="https://github.com/banluo2006" target="_blank" rel="noopener">github.com/banluo2006</a>
          <a href="javascript:void(0)" data-email="true" onclick="copyEmail()" title="点击复制邮箱">3112371653@qq.com</a>
        </div>
      </div>
      <div style="font-size:0.75rem;color:var(--color-text-muted);text-align:center;width:100%;border-top:1px solid rgba(255,255,255,0.08);padding-top:0.75rem;line-height:1.6">
        免责声明：本博客所有内容仅供个人学习参考，不构成任何建议。转载文章请联系作者获取授权。
      </div>
    </div>
  </footer>

  <!-- Back to Top -->
  <button class="back-to-top" id="back-to-top" aria-label="回到顶部">↑</button>

  <!-- Scripts -->
  <script src="data/site-config.js"></script>
  <script src="data/posts.js"></script>
  <script src="js/blog-data.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/post.js"></script>
  <script>
    initTheme();
    initColorScheme();
    initPost();
  </script>
</body>
</html>
